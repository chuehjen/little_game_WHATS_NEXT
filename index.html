<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<meta name="color-scheme" content="dark">
<meta name="description" content="A color memory game — memorize, recreate, and score. 3 rounds, 30 seconds of pure color instinct.">
<meta property="og:title" content="WHAT'S NEXT — Color Memory Game">
<meta property="og:description" content="Memorize a color, recreate it with HSL sliders, and test your color instinct across 3 rounds.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<title>WHAT'S NEXT</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Michroma&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#000000;
  font-family:'Space Grotesk','Inter',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
  color:#f5f5f5;
  color-scheme:dark;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
  touch-action:manipulation;
}
body{
  position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding-top:50px;
  padding-bottom:50px;
}
/* ===== Countdown Timer ===== */
.countdown{
  position:fixed;
  top:70px;
  right:20px;
  z-index:200;
  font-size:40px;
  font-weight:600;
  font-variant-numeric:tabular-nums;
  letter-spacing:4px;
  color:#f5f5f5;
  line-height:1;
  opacity:1;
  transition:opacity .25s;
}

/* ===== Full-screen Color Background ===== */
.color-bg{
  position:absolute;
  top:50px;left:0;right:0;bottom:50px;
  z-index:1;
  transition:background-color .1s ease-out;
}
.color-bg.hidden{display:none!important}

/* ===== Overlay Content Layer ===== */
.overlay{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;height:100%;
  padding:calc(70px + env(safe-area-inset-top)) 20px calc(30px + env(safe-area-inset-bottom));
}

/* ===== Start Screen ===== */
.start-screen{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
  max-width:360px;
  width:100%;
  padding:0 24px;
}
.start-screen .logo{
  font-family:'Michroma','Space Grotesk',sans-serif;
  font-size:36px;font-weight:400;letter-spacing:4px;
  text-transform:uppercase;
  background:linear-gradient(135deg,#f5f5f5 0%,rgba(245,245,245,.5) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:32px;
  line-height:1.1;
}
.start-screen .rules{
  font-size:15px;line-height:1.6;
  color:rgba(245,245,245,.5);
  font-weight:300;
  min-height:80px;
  margin-bottom:32px;
}

/* ===== Memorize Hint ===== */
.memorize-hint{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:20;
  font-size:16px;font-weight:500;
  color:rgba(245,245,245,.6);
  letter-spacing:1px;
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
}
.memorize-hint.show{opacity:1}

/* ===== Tune Controls ===== */
.tune-controls{
  position:fixed;
  bottom:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  width:100%;
  padding:0 24px calc(60px + env(safe-area-inset-bottom));
  z-index:50;
}
.sliders{width:100%;max-width:400px;display:flex;flex-direction:column;gap:28px;margin-bottom:12px}
.slider-group{display:flex;flex-direction:column;gap:10px}
.slider-label{
  display:flex;justify-content:space-between;align-items:center;
  font-size:13px;color:rgba(245,245,245,.5);
  text-transform:uppercase;letter-spacing:1px;font-weight:500;
}
.slider-label .val{
  font-variant-numeric:tabular-nums;
  color:rgba(245,245,245,.8);
  font-weight:600;
  font-size:14px;
}
input[type=range]{
  -webkit-appearance:none;appearance:none;
  width:100%;height:8px;border-radius:4px;
  outline:none;
}
#sliderH{
  background:linear-gradient(to right,
    hsl(0,100%,50%),hsl(60,100%,50%),hsl(120,100%,50%),
    hsl(180,100%,50%),hsl(240,100%,50%),hsl(300,100%,50%),
    hsl(360,100%,50%));
}
#sliderS{background:linear-gradient(to right,#808080,#f5f5f5)}
#sliderL{background:linear-gradient(to right,#000000,#808080,#f5f5f5)}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:28px;height:28px;border-radius:50%;
  background:#f5f5f5;
  box-shadow:0 2px 10px rgba(0,0,0,.4);
  cursor:pointer;
  border:2px solid rgba(0,0,0,.1);
}
input[type=range]::-moz-range-thumb{
  width:28px;height:28px;border-radius:50%;border:2px solid rgba(0,0,0,.1);
  background:#f5f5f5;
  box-shadow:0 2px 10px rgba(0,0,0,.4);
  cursor:pointer;
}

/* ===== Buttons ===== */
.btn{
  margin-top:48px;
  min-width:160px;min-height:52px;
  padding:16px 40px;
  border:none;border-radius:14px;
  background:#f5f5f5;color:#000000;
  font-family:inherit;
  font-size:15px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;
  cursor:pointer;
  transition:opacity .15s,transform .1s;
}
.btn:active{opacity:.7;transform:scale(.97)}
.btn-start{
  font-size:16px;
  padding:18px 56px;
  border-radius:16px;
  letter-spacing:2.5px;
}

/* ===== Result / Final Screen ===== */
.result-screen{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;gap:10px;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:20px;
  padding:36px 32px 32px;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
  border:1px solid rgba(245,245,245,.06);
  max-width:360px;width:100%;
}
.result-screen .label{
  font-size:12px;color:rgba(245,245,245,.35);
  text-transform:uppercase;letter-spacing:1.5px;font-weight:500;
}
.result-screen .score-value{
  font-size:64px;font-weight:700;
  font-variant-numeric:tabular-nums;
  line-height:1.1;letter-spacing:-1px;
}
.result-screen .score-detail{
  font-size:12px;color:rgba(245,245,245,.3);
  margin-top:2px;font-weight:300;
}
.result-screen .color-compare{
  display:flex;align-items:center;gap:10px;
  margin-top:12px;
}
.result-screen .color-swatch{
  width:40px;height:40px;border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.result-screen .color-arrow{
  font-size:14px;color:rgba(245,245,245,.25);
}
.result-screen .total-breakdown{
  font-size:13px;color:rgba(245,245,245,.45);
  margin-top:8px;font-weight:400;letter-spacing:.3px;
}

/* ===== History Button ===== */
.btn-history{
  margin-top:12px;
  min-width:160px;min-height:44px;
  padding:12px 32px;
  border:1.5px solid rgba(245,245,245,.2);
  border-radius:14px;
  background:transparent;color:rgba(245,245,245,.5);
  font-family:inherit;
  font-size:13px;font-weight:500;letter-spacing:1.5px;
  text-transform:uppercase;
  cursor:pointer;
  transition:opacity .15s,transform .1s,border-color .2s,color .2s;
}
.btn-history:active{opacity:.7;transform:scale(.97)}

/* ===== History Modal ===== */
.history-modal{
  position:fixed;inset:0;
  z-index:500;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  opacity:0;
  pointer-events:none;
  transition:opacity .25s ease;
}
.history-modal.open{
  opacity:1;
  pointer-events:auto;
}
.history-backdrop{
  position:absolute;inset:0;
  background:rgba(0,0,0,.7);
  -webkit-backdrop-filter:blur(8px);
  backdrop-filter:blur(8px);
}
.history-card{
  position:relative;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:20px;
  padding:32px 28px 28px;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
  border:1px solid rgba(245,245,245,.06);
  max-width:320px;width:100%;
  max-height:70vh;
  animation:fadeIn .3s ease;
}
.history-card .label{
  font-size:12px;color:rgba(245,245,245,.35);
  text-transform:uppercase;letter-spacing:2px;font-weight:500;
  margin-bottom:20px;
}
.history-list{
  width:100%;
  display:flex;flex-direction:column;gap:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.history-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 4px;
  border-bottom:1px solid rgba(245,245,245,.05);
}
.history-item:last-child{border-bottom:none}
.history-rank{
  font-size:13px;font-weight:500;
  color:rgba(245,245,245,.3);
  font-variant-numeric:tabular-nums;
  min-width:36px;text-align:left;
}
.history-score{
  font-size:18px;font-weight:600;
  font-variant-numeric:tabular-nums;
  color:#f5f5f5;
  letter-spacing:.5px;
}
.history-date{
  font-size:11px;font-weight:400;
  color:rgba(245,245,245,.2);
  flex:1;text-align:center;
}
.history-empty{
  font-size:14px;color:rgba(245,245,245,.3);
  font-weight:300;
  padding:20px 0;
}
.btn-close{
  margin-top:20px;
  min-width:120px;min-height:40px;
  padding:10px 28px;
  border:1.5px solid rgba(245,245,245,.15);
  border-radius:12px;
  background:transparent;color:rgba(245,245,245,.5);
  font-family:inherit;
  font-size:13px;font-weight:500;letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  transition:opacity .15s,transform .1s;
}
.btn-close:active{opacity:.7;transform:scale(.97)}

/* ===== Utility ===== */
.hide{display:none!important}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.cursor{
  display:inline-block;
  animation:blink .6s step-end infinite;
  color:rgba(245,245,245,.4);
  font-weight:300;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>

<!-- safe area: body padding provides 50px black margins for Safari nav bars -->

<div class="countdown hide" id="countdown" aria-live="polite" aria-label="Countdown timer"></div>
<div class="color-bg hidden" id="colorBg" role="presentation"></div>
<div class="memorize-hint" id="memorizeHint">Remember this color</div>

<div class="overlay" id="overlay">

  <!-- Start Screen -->
  <div class="start-screen" id="startScreen">
    <div class="logo" role="heading" aria-level="1">WHAT'S NEXT</div>
    <div class="rules" id="rulesText" aria-live="polite"></div>
    <button class="btn btn-start hide" id="startBtn">Start</button>
    <button class="btn-history hide" id="historyBtn">History</button>
  </div>

  <!-- Tune Controls -->
  <div class="tune-controls hide" id="tuneControls" role="group" aria-label="Color adjustment sliders">
    <div class="sliders">
      <div class="slider-group">
        <div class="slider-label"><span>Hue</span><span class="val" id="hVal">0</span></div>
        <input type="range" id="sliderH" min="0" max="360" value="0" aria-label="Hue">
      </div>
      <div class="slider-group">
        <div class="slider-label"><span>Saturation</span><span class="val" id="sVal">50</span></div>
        <input type="range" id="sliderS" min="0" max="100" value="50" aria-label="Saturation">
      </div>
      <div class="slider-group">
        <div class="slider-label"><span>Lightness</span><span class="val" id="lVal">50</span></div>
        <input type="range" id="sliderL" min="0" max="100" value="50" aria-label="Lightness">
      </div>
    </div>
    <button class="btn" id="confirmBtn">Confirm</button>
  </div>

  <!-- Result Screen -->
  <div class="result-screen hide" id="resultScreen">
    <div class="label">Round Score</div>
    <div class="score-value" id="scoreValue">0.00</div>
    <div class="color-compare" id="colorCompare">
      <div class="color-swatch" id="swatchTarget"></div>
      <span class="color-arrow">&#8594;</span>
      <div class="color-swatch" id="swatchPlayer"></div>
    </div>
    <div class="score-detail" id="scoreDetail"></div>
    <button class="btn" id="nextBtn">Next</button>
  </div>

  <!-- Final Screen -->
  <div class="result-screen hide" id="finalScreen">
    <div class="label">Game Over</div>
    <div class="score-value" id="finalScore">0.00</div>
    <div class="total-breakdown" id="totalBreakdown"></div>
    <button class="btn" id="restartBtn">Play Again</button>
    <button class="btn-history" id="finalHistoryBtn">History</button>
  </div>

</div>

<!-- History Modal -->
<div class="history-modal" id="historyModal">
  <div class="history-backdrop" id="historyBackdrop"></div>
  <div class="history-card">
    <div class="label">Top 10</div>
    <div class="history-list" id="historyList"></div>
    <button class="btn-close" id="historyClose">Close</button>
  </div>
</div>

<script>

</script>
</body>
</html>
